{% extends "base.html" %}
{% block title %}Calendário{% endblock %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-calendar"></i> Calendário</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#novoCompromissoModal">
                    <i class="bi bi-plus"></i> Novo Compromisso
                </button>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-9">
            <div class="card">
                <div class="card-body">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-header">
                    <h6>Próximos Compromissos</h6>
                </div>
                <div class="card-body">
                    <div class="list-group list-group-flush">
                        <div class="list-group-item">
                            <small class="text-muted">Hoje, 14:00</small>
                            <div>Reunião com Cliente</div>
                        </div>
                        <div class="list-group-item">
                            <small class="text-muted">Amanhã, 10:00</small>
                            <div>Audiência - Processo 123</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Novo Compromisso -->
<div class="modal fade" id="novoCompromissoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Novo Compromisso</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <label class="form-label">Data Início</label>
                            <input type="datetime-local" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Data Fim</label>
                            <input type="datetime-local" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary">Salvar</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
